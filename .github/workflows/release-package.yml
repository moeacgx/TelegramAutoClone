name: Release Package CI

on:
  push:
    tags:
      - "v*"

jobs:
  build-release-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Write version file
        run: echo "${GITHUB_REF_NAME}" > VERSION

      - name: Build standalone package
        run: pyinstaller build/telegram_auto_clone.spec --clean

      - name: Copy version metadata
        run: cp VERSION dist/telegram-auto-clone/VERSION

      - name: Archive release asset
        run: |
          cd dist
          zip -r telegram-auto-clone-linux-x64.zip telegram-auto-clone

      - name: Publish release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/telegram-auto-clone-linux-x64.zip